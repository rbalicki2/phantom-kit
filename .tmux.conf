# Set the prefix to Ctrl-a
set -g prefix C-a

# Free the original Ctrl-b prefix binding
unbind C-b

# Ensure that we can send Ctrl-a to other apps by pressing it twice
bind C-a send-prefix

bind-key '!' select-window -t 1
bind-key '@' select-window -t 2
bind-key '#' select-window -t 3
bind-key '$' select-window -t 4
bind-key '%' select-window -t 5

set -g mouse on

# bash-tmux-vi-1
# Use vi keys in copy mode
setw -g mode-keys vi

# bash-tmux-history-1
# Set a massive history limit
set -g history-limit 500000

# bash-tmux-status-1
set -g status-style 'bg=#333333 fg=#5eacd3'
set -g status-left-length 20
set -g status-left '#[fg=green](#S) '
set -g status-right '#[fg=white]%H:%M #[fg=yellow]%d-%b-%y'

bind-key x kill-pane


# bash-tmux-index-1
# Start window numbering at 1
set -g base-index 1

# Start pane numbering at 1
setw -g pane-base-index 1

# Ensure window numbers are re-sequenced when a window is closed
set -g renumber-windows on

bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

set -g status-left ""
set -g status-right ""

# Set a subtle background color for the bar
set -g status-style 'bg=#1e1e1e fg=#89b4fa'

# Inactive window: Grey index and blue name
setw -g window-status-format "#[fg=white,bg=#1e1e1e] #I:#[fg=#89b4fa,bg=#1e1e1e]#W "

# Active window: Bold white text on a slightly lighter grey background
setw -g window-status-current-format "#[fg=white,bold,bg=#333333] #I:#W "

# Remove spacing between window list items for a tighter look
set -g window-status-separator ""
