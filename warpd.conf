# /Users/rbalicki/code/voicemode/warpd.conf

# 1. Dimensions for 3x3
grid_nr: 3
grid_nc: 3

# 2. Key Sequence (9 keys total)
# Top row: u i o
# Mid row: j k l
# Bot row: m , .
grid_keys: u i o j k l m , .

# 3. Actions - disabled (Karabiner handles clicking via warpd --click)
# Using number keys we won't press so warpd only positions, doesn't click
oneshot_buttons: 1 2 3

# 4. Exit key - use q instead of escape (Karabiner handles exits via pkill)
exit: q