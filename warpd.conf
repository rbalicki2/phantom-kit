# /Users/rbalicki/code/voicemode/warpd.conf

# Grid settings (3x3)
grid_nr: 3
grid_nc: 3
grid_keys: u i o j k l m , .
grid_exit: y
grid_color: #FFFFFF

# Normal mode movement (IJKL)
up: i
down: k
left: j
right: l

# Click keys (oneshot = click and exit warpd)
# Format: left_click middle_click right_click
# q = left click + exit, - = middle (unused), w = right click + exit
oneshot_buttons: q - w

# N enters normal mode (fine-grained mouse movement with IJKL)
normal: n