# /Users/rbalicki/code/voicemode/warpd.conf

# Grid settings (3x3)
grid_nr: 3
grid_nc: 3
grid_keys: u i o j k l m , .
grid_exit: y

# Normal mode movement (IJKL)
up: i
down: k
left: j
right: l

# Click keys (oneshot = click and exit warpd)
# n = left click + exit, h = right click + exit
oneshot_buttons: n h

# Drag mode (toggle with 6)
drag: 6